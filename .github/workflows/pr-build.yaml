name: Pull request (Build)
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency: unique-state-lock

permissions:
  contents: read
  id-token: write

jobs:
  create-terraform-plan:
    uses: KarafrOrg/actions-terraform-core/.github/workflows/plan.yaml@v0.1.0
    name: Create Terraform plan
    with:
      environment: karafra-net
      gcp_sa_email: github-actions-infra-terraform@karafra-net.iam.gserviceaccount.com
      gcp_wif_resource_id: ${{ vars.GCP_WIF_RESOURCE_ID }}
    secrets: inherit
