name: Destroy
on:
  workflow_dispatch:
    inputs:
      approve_destroy:
        description: 'Approve destruction of infrastructure'
        required: true
        type: boolean

concurrency: unique-state-lock

permissions:
  contents: read
  id-token: write

jobs:
  destroy-terraform-infra:
    uses: KarafrOrg/actions-terraform-core/.github/workflows/destroy.yaml@v0.1.0
    name: Destroy Terraform infrastructure
    with:
      environment: karafra-net
      gcp_sa_email: github-actions-infra-terraform@karafra-net.iam.gserviceaccount.com
      gcp_wif_resource_id: ${{ vars.GCP_WIF_RESOURCE_ID }}
      approve_destroy: ${{ github.event.inputs.approve_destroy }}
    secrets: inherit
